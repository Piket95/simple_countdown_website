<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .countdown-font {
            font-family: 'Orbitron', monospace;
        }
        
        /* Theme: Gradient (Default) */
        .theme-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }
        
        .theme-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 219, 98, 0.2) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        
        .theme-gradient .countdown-number {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                         0 0 40px rgba(255, 255, 255, 0.3),
                         0 0 60px rgba(255, 255, 255, 0.1);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .theme-gradient .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Theme: shadcn/ui */
        .theme-shadcn {
            background: hsl(0 0% 3.9%);
            min-height: 100vh;
            position: relative;
        }
        
        .theme-shadcn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(248, 248, 248, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(248, 248, 248, 0.02) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(248, 248, 248, 0.01) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        
        .theme-shadcn .countdown-number {
            text-shadow: 0 0 20px rgba(248, 248, 248, 0.3),
                         0 0 40px rgba(248, 248, 248, 0.2),
                         0 0 60px rgba(248, 248, 248, 0.1);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .theme-shadcn .glass-effect {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(55, 65, 81, 0.5);
        }
        
        .theme-shadcn .sidebar {
            background: rgba(17, 24, 39, 0.95);
        }
        
        .theme-shadcn .sidebar h2,
        .theme-shadcn .sidebar label,
        .theme-shadcn .sidebar h3 {
            color: #f8fafc;
        }
        
        .theme-shadcn .sidebar input,
        .theme-shadcn .sidebar select {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(55, 65, 81, 0.5);
            color: #f8fafc;
        }
        
        .theme-shadcn .sidebar input:focus,
        .theme-shadcn .sidebar select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .theme-shadcn .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        
        .theme-shadcn .sidebar .bg-gray-100 {
            background: rgba(31, 41, 55, 0.8) !important;
        }
        
        .theme-shadcn .sidebar .text-gray-700,
        .theme-shadcn .sidebar .text-gray-600 {
            color: #d1d5db !important;
        }
        
        /* Theme: Minimalistic Dark */
        .theme-minimal {
            background: #1f2937;
            min-height: 100vh;
            position: relative;
        }
        
        .theme-minimal::before {
            display: none;
        }
        
        .theme-minimal .countdown-number {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: subtleGlow 3s ease-in-out infinite alternate;
            color: #f3f4f6;
        }
        
        .theme-minimal .glass-effect {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(55, 65, 81, 0.4);
        }
        
        .theme-minimal .sidebar {
            background: rgba(31, 41, 55, 0.95);
        }
        
        .theme-minimal .sidebar h2,
        .theme-minimal .sidebar label,
        .theme-minimal .sidebar h3 {
            color: #f3f4f6;
        }
        
        .theme-minimal .sidebar input,
        .theme-minimal .sidebar select {
            background: rgba(55, 65, 81, 0.8);
            border: 1px solid rgba(75, 85, 99, 0.5);
            color: #f3f4f6;
        }
        
        .theme-minimal .sidebar input:focus,
        .theme-minimal .sidebar select:focus {
            border-color: #6b7280;
            box-shadow: 0 0 0 3px rgba(107, 114, 128, 0.1);
        }
        
        .theme-minimal .btn-primary {
            background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
        }
        
        .theme-minimal .pulse {
            animation: pulse 2s infinite;
        }
        
        /* Add minimalistic-specific animations */
        @keyframes minimalGlow {
            from { text-shadow: 0 0 10px rgba(243, 244, 246, 0.3), 0 0 20px rgba(243, 244, 246, 0.2), 0 0 30px rgba(243, 244, 246, 0.1); }
            to { text-shadow: 0 0 15px rgba(243, 244, 246, 0.5), 0 0 25px rgba(243, 244, 246, 0.3), 0 0 35px rgba(243, 244, 246, 0.2); }
        }
        
        @keyframes minimalFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -15px) rotate(0.5deg); }
            66% { transform: translate(-10px, 10px) rotate(-0.5deg); }
        }
        
        .theme-minimal .countdown-number {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: subtleGlow 3s ease-in-out infinite alternate;
            color: #f3f4f6;
        }
        
        .theme-minimal .countdown-number:hover {
            animation: minimalGlow 1.5s ease-in-out infinite alternate;
        }
        
        .theme-minimal .sidebar .bg-gray-100 {
            background: rgba(55, 65, 81, 0.8) !important;
        }
        
        .theme-minimal .sidebar .text-gray-700,
        .theme-minimal .sidebar .text-gray-600 {
            color: #d1d5db !important;
        }
        
        .theme-minimal .sidebar-toggle {
            background: rgba(55, 65, 81, 0.8) !important;
            color: #f3f4f6 !important;
        }
        
        .theme-minimal .sidebar-toggle:hover {
            background: rgba(75, 85, 99, 0.8) !important;
        }
        
        /* Font variations for themes */
        .theme-shadcn .countdown-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .theme-minimal .countdown-font {
            font-family: 'Source Sans Pro', sans-serif;
        }
        
        .theme-minimal body {
            font-family: 'Source Sans Pro', sans-serif;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }
        
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 255, 255, 0.3), 0 0 60px rgba(255, 255, 255, 0.1); }
            to { text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 50px rgba(255, 255, 255, 0.5), 0 0 70px rgba(255, 255, 255, 0.3); }
        }
        
        @keyframes subtleGlow {
            from { text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3), 0 0 10px rgba(243, 244, 246, 0.1); }
            to { text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3), 0 0 20px rgba(243, 244, 246, 0.3); }
        }
        
        .sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-toggle {
            transition: all 0.3s ease;
        }
        
        .sidebar-toggle:hover {
            transform: scale(1.1);
        }
        
        .time-unit {
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .time-unit:nth-child(1) { animation-delay: 0.1s; }
        .time-unit:nth-child(2) { animation-delay: 0.2s; }
        .time-unit:nth-child(3) { animation-delay: 0.3s; }
        .time-unit:nth-child(4) { animation-delay: 0.4s; }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .form-input {
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary {
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Custom scrollbar styles for themes */
        /* Theme: Gradient scrollbar */
        .theme-gradient ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .theme-gradient ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        
        .theme-gradient ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.6), rgba(118, 75, 162, 0.6));
            border-radius: 4px;
            transition: background 0.3s ease;
        }
        
        .theme-gradient ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.8));
        }
        
        /* Theme: shadcn/ui scrollbar */
        .theme-shadcn ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .theme-shadcn ::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5);
            border-radius: 4px;
        }
        
        .theme-shadcn ::-webkit-scrollbar-thumb {
            background: rgba(55, 65, 81, 0.8);
            border-radius: 4px;
            border: 1px solid rgba(75, 85, 99, 0.3);
            transition: background 0.3s ease;
        }
        
        .theme-shadcn ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.6);
            border-color: rgba(59, 130, 246, 0.4);
        }
        
        /* Theme: Minimalistic scrollbar */
        .theme-minimal ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        .theme-minimal ::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.3);
            border-radius: 3px;
        }
        
        .theme-minimal ::-webkit-scrollbar-thumb {
            background: rgba(75, 85, 99, 0.6);
            border-radius: 3px;
            transition: background 0.3s ease;
        }
        
        .theme-minimal ::-webkit-scrollbar-thumb:hover {
            background: rgba(107, 114, 128, 0.8);
        }
        
        /* Firefox scrollbar support */
        .theme-gradient {
            scrollbar-width: thin;
            scrollbar-color: rgba(102, 126, 234, 0.6) rgba(255, 255, 255, 0.1);
        }
        
        .theme-shadcn {
            scrollbar-width: thin;
            scrollbar-color: rgba(55, 65, 81, 0.8) rgba(31, 41, 55, 0.5);
        }
        
        .theme-minimal {
            scrollbar-width: thin;
            scrollbar-color: rgba(75, 85, 99, 0.6) rgba(31, 41, 55, 0.3);
        }
    </style>
</head>
<body>
    <div id="mainContainer" class="theme-gradient">
        <!-- Sidebar Toggle Button -->
        <button id="sidebarToggle" class="sidebar-toggle fixed top-6 left-6 z-50 bg-white/20 backdrop-blur-md text-white p-3 rounded-full shadow-lg hover:bg-white/30 transition-opacity duration-300">
            <i class="fas fa-bars text-xl"></i>
        </button>
        
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-80 bg-white/95 backdrop-blur-xl shadow-2xl z-40 overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Settings</h2>
                    <button id="closeSidebar" class="text-gray-500 hover:text-gray-700 transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <form id="configForm" class="space-y-6">
                    <!-- Title Input -->
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-heading mr-2"></i>Countdown Title
                        </label>
                        <input 
                            type="text" 
                            id="title" 
                            name="title"
                            placeholder="e.g., New Year 2025"
                            class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
                            value="New Year 2025"
                        >
                    </div>
                    
                    <!-- Date Input -->
                    <div>
                        <label for="date" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-calendar mr-2"></i>Date
                        </label>
                        <input 
                            type="date" 
                            id="date" 
                            name="date"
                            class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
                            value="2025-01-01"
                        >
                    </div>
                    
                    <!-- Time Input -->
                    <div>
                        <label for="time" class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-clock mr-2"></i>Time
                        </label>
                        <input 
                            type="time" 
                            id="time" 
                            name="time"
                            class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
                            value="00:00"
                        >
                    </div>
                    
                    <!-- Theme Selection -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-palette mr-2"></i>Theme
                        </label>
                        <div class="space-y-2">
                            <label class="flex items-center">
                                <input type="radio" name="theme" value="gradient" checked class="mr-2">
                                <span>Gradient (Default)</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="theme" value="shadcn" class="mr-2">
                                <span>shadcn/ui Dark</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="theme" value="minimal" class="mr-2">
                                <span>Minimalistic Dark</span>
                            </label>
                        </div>
                    </div>
                    
                                        
                    <!-- Timezone Selection -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-globe mr-2"></i>Timezone
                        </label>
                        <div class="space-y-3">
                            <!-- UTC Offset Selector -->
                            <div>
                                <label for="utcOffset" class="text-xs text-gray-600 mb-1 block">UTC Offset</label>
                                <select 
                                    id="utcOffset" 
                                    name="utcOffset"
                                    class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-sm"
                                >
                                    <option value="UTC-12">UTC-12</option>
                                    <option value="UTC-11">UTC-11</option>
                                    <option value="UTC-10">UTC-10</option>
                                    <option value="UTC-9">UTC-9</option>
                                    <option value="UTC-8">UTC-8</option>
                                    <option value="UTC-7">UTC-7</option>
                                    <option value="UTC-6">UTC-6</option>
                                    <option value="UTC-5">UTC-5</option>
                                    <option value="UTC-4">UTC-4</option>
                                    <option value="UTC-3">UTC-3</option>
                                    <option value="UTC-2">UTC-2</option>
                                    <option value="UTC-1">UTC-1</option>
                                    <option value="UTC+0" selected>UTC+0</option>
                                    <option value="UTC+1">UTC+1</option>
                                    <option value="UTC+2">UTC+2</option>
                                    <option value="UTC+3">UTC+3</option>
                                    <option value="UTC+4">UTC+4</option>
                                    <option value="UTC+5">UTC+5</option>
                                    <option value="UTC+6">UTC+6</option>
                                    <option value="UTC+7">UTC+7</option>
                                    <option value="UTC+8">UTC+8</option>
                                    <option value="UTC+9">UTC+9</option>
                                    <option value="UTC+10">UTC+10</option>
                                    <option value="UTC+11">UTC+11</option>
                                    <option value="UTC+12">UTC+12</option>
                                    <option value="UTC+13">UTC+13</option>
                                    <option value="UTC+14">UTC+14</option>
                                </select>
                            </div>
                            
                            <!-- City/Region Selector -->
                            <div>
                                <label for="cityTimezone" class="text-xs text-gray-600 mb-1 block">City/Region</label>
                                <select 
                                    id="cityTimezone" 
                                    name="cityTimezone"
                                    class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-sm"
                                >
                                    <option value="">Select a city...</option>
                                </select>
                            </div>
                            
                            <!-- Abbreviation Selector -->
                            <div>
                                <label for="abbrTimezone" class="text-xs text-gray-600 mb-1 block">Timezone Abbreviation</label>
                                <select 
                                    id="abbrTimezone" 
                                    name="abbrTimezone"
                                    class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none text-sm"
                                >
                                    <option value="">Select abbreviation...</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Apply Button -->
                    <button type="submit" class="btn-primary w-full py-3 px-4 text-white font-semibold rounded-lg shadow-lg">
                        <i class="fas fa-check mr-2"></i>Apply Changes
                    </button>
                </form>
                
                <!-- Current Settings Display -->
                <div class="mt-6 p-4 bg-gray-100 rounded-lg">
                    <h3 class="font-semibold text-gray-700 mb-2">Current Settings:</h3>
                    <div id="currentSettings" class="text-sm text-gray-600 space-y-1">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <main class="flex items-center justify-center min-h-screen relative z-10 px-4">
            <div class="text-center text-white">
                <!-- Title -->
                <h1 id="countdownTitle" class="text-4xl md:text-6xl font-bold mb-8 countdown-font">
                    New Year 2025
                </h1>
                
                <!-- Timezone Display -->
                <div id="timezoneDisplay" class="text-xl md:text-2xl mb-12 font-light opacity-80">
                    Europe/Berlin
                </div>
                
                <!-- Countdown Display -->
                <div id="countdown" class="countdown-font">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 max-w-4xl mx-auto">
                        <div class="time-unit glass-effect rounded-2xl p-6 md:p-8">
                            <div id="days" class="text-4xl md:text-7xl font-bold countdown-number">00</div>
                            <div class="text-sm md:text-lg mt-2 opacity-80">Days</div>
                        </div>
                        <div class="time-unit glass-effect rounded-2xl p-6 md:p-8">
                            <div id="hours" class="text-4xl md:text-7xl font-bold countdown-number">00</div>
                            <div class="text-sm md:text-lg mt-2 opacity-80">Hours</div>
                        </div>
                        <div class="time-unit glass-effect rounded-2xl p-6 md:p-8">
                            <div id="minutes" class="text-4xl md:text-7xl font-bold countdown-number">00</div>
                            <div class="text-sm md:text-lg mt-2 opacity-80">Minutes</div>
                        </div>
                        <div class="time-unit glass-effect rounded-2xl p-6 md:p-8">
                            <div id="seconds" class="text-4xl md:text-7xl font-bold countdown-number">00</div>
                            <div class="text-sm md:text-lg mt-2 opacity-80">Seconds</div>
                        </div>
                    </div>
                </div>
                
                <!-- Completed Message -->
                <div id="completedMessage" class="hidden">
                    <div class="text-6xl md:text-8xl font-bold mb-4 countdown-number">🎉</div>
                    <div class="text-2xl md:text-4xl font-light">Time's Up!</div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
